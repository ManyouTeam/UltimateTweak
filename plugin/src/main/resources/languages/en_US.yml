tree-debug:
  enabled: "&#98FB98[UltimateTweak] &aTree definition debug enabled: &e{id}"
  enabled-hint: "&#98FB98[UltimateTweak] &7Now try mining a tree. Use /ut debug off to disable."
  disabled: "&#98FB98[UltimateTweak] &aTree definition debug disabled."
  not-found: "&#98FB98[UltimateTweak] &cTree definition not found: {id}"
  header: "&#98FB98[UltimateTweak] &fTree debug: &e{id} &7(origin {position})"
  check-pass: "&#98FB98[UltimateTweak] &a[PASS] &f{name}: &e{actual} &7(required: {expected})"
  check-fail: "&#98FB98[UltimateTweak] &c[FAIL] &f{name}: &e{actual} &7(required: {expected})"
  check-name:
    origin-block: "origin block"
    logs: "logs"
    leaves: "leaves"
  scanned: "&#98FB98[UltimateTweak] &7Scanned candidate blocks: {amount}"
  result-pass: "&#98FB98[UltimateTweak] &aResult: this tree satisfies the definition."
  result-fail: "&#98FB98[UltimateTweak] &cResult: [FAIL] lines above are why this tree is not recognized."
  unlimited: "unlimited"

