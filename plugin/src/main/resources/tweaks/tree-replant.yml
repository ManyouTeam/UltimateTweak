enabled: true

# Wait before checking a newly dropped sapling.
cooldown-ticks: 20

# How often dropped saplings are checked, and how long they may stay airborne.
check-interval-ticks: 20
max-wait-ticks: 60

# Each group contains its own saplings and valid soils.
rules:
  overworld-trees:
    saplings:
      oak:
        match-item:
          material:
            - oak_sapling
        block: minecraft:oak_sapling
      spruce:
        match-item:
          material:
            - spruce_sapling
        block: minecraft:spruce_sapling
      birch:
        match-item:
          material:
            - birch_sapling
        block: minecraft:birch_sapling
      jungle:
        match-item:
          material:
            - jungle_sapling
        block: minecraft:jungle_sapling
      acacia:
        match-item:
          material:
            - acacia_sapling
        block: minecraft:acacia_sapling
      dark-oak:
        match-item:
          material:
            - dark_oak_sapling
        block: minecraft:dark_oak_sapling
      cherry:
        match-item:
          material:
            - cherry_sapling
        block: minecraft:cherry_sapling
      pale-oak:
        match-item:
          material:
            - pale_oak_sapling
        block: minecraft:pale_oak_sapling
      azalea:
        match-item:
          material:
            - azalea
        block: minecraft:azalea
      flowering-azalea:
        match-item:
          material:
            - flowering_azalea
        block: minecraft:flowering_azalea
    valid-soilds:
      - minecraft:dirt
      - minecraft:grass_block
      - minecraft:podzol
      - minecraft:coarse_dirt
      - minecraft:rooted_dirt
      - minecraft:mycelium
      - minecraft:moss_block
      - minecraft:mud

  mangrove:
    saplings:
      mangrove:
        match-item:
          material:
            - mangrove_propagule
        block: minecraft:mangrove_propagule
    valid-soilds:
      - minecraft:mud
      - minecraft:clay

  custom:
    saplings:
      palm:
        match-item:
          items:
            - palm_sapling
        block: craftengine:default:palm_sapling
    valid-soilds:
      - minecraft:dirt
      - minecraft:grass_block
      - minecraft:sand
