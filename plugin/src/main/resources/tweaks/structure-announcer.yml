enabled: true

# blacklist: enabled in every world except those listed below.
# whitelist: enabled only in the worlds listed below.
worlds:
  mode: blacklist
  list: []

# Empty list means all structures.
# Supports names like village_plains or minecraft:village_plains.
structures: []

# How often players' current structures are checked.
check-interval-ticks: 20

# All conditions must pass before sending the structure enter message.
conditions: []

# Default message.
message: "[title]&e{lang:structure-announcer}[/title]"

# Executed after entering a structure.
# You can use {structure}, {from-structure}, and {to-structure} in action strings.
structure-enter-actions:
  1:
    type: sound
    sound: entity.experience_orb.pickup
    volume: 1.0
    pitch: 1.2

# Optional per-structure messages. These override message above.
structure-messages:
