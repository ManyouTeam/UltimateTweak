enabled: true

# Minimum interval between multiblock detections for the same player.
cooldown-ticks: 5

# Maximum number of blocks broken in the same tick.
# Set smaller value if you are running large servers.
blocks-per-tick: 32

require-shift: false

match-item:
  trigger:
    material-tag:
      - 'axes'
  leaf-break:
    has-enchants:
      - 'custom:tree_shears'

animation:
  # If this lag your server, try to disable it.
  enabled: true
  # random, same-as-player, away-from-player
  direction: random
  glow: true
  glow-color: '#FFFFFF'
  duration-ticks: 30
  interval-ticks: 1
  view-distance: 24
  # Will cost extra server performance.
  fall-damage:
    enabled: false
    players: true
    entities: true
    damage: 6.0
    min-angle: 15.0
    hit-radius: 0.5
    check-interval-ticks: 2

damage-glow:
  enabled: true
  hide-breaking-block: true
  glow-color: '#FFFFFF'
  duration-ticks: 40
  view-distance: 24

# Each log compounds the mining time by percent-per-log, limited by max-percent.
mining-time:
  enabled: true
  percent-per-log: 100.0
  max-percent: 5000.0

damage-actions: []

break-actions:
  1:
    type: sound
    sound: entity.zombie.break_wooden_door
    volume: 1.0
    pitch: 1.0
  2:
    type: action_bar
    message: "{lang:tree-cutter-break-summary}"

conditions: []
